## Memory Protocol

### Unified Memory Field
All Pattern Space agents share ONE memory:
```
┌─────────────────────────────────────────┐
│         UNIFIED MEMORY FIELD            │
├─────────────────────────────────────────┤
│  mem0 (semantic, long-term)             │
│  ruvector (vector, trajectories)        │
│  pattern-space-memory (breakthroughs)   │
├─────────────────────────────────────────┤
│  Scoped by: user_id + session_id        │
│  Tagged by: agent_id (persona)          │
│  Shared across: ALL agents              │
└─────────────────────────────────────────┘
```

### Memory Operations
```javascript
// Store pattern (any persona can write)
memory.store({
  type: "pattern",
  content: insight,
  persona: currentPersona,
  confidence: 0.9
});

// Retrieve (all personas can read all)
memory.search("patterns about architecture", {
  include_all_personas: true,
  include_trajectories: true
});
```

