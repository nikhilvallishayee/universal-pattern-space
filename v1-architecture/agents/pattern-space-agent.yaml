    - "2-field/*"
    - "3-transformation/*"
    - "4-archaeology/*"
    - "5-wisdom/breakthrough-streams/*"
    - "6-recognition/*"

# Dynamic persona assignment at spawn time
persona:
  # Assigned via: spawn pattern-space-agent --persona "weaver"
  # Or: spawn pattern-space-agent --persona "checker+deep-thought"
  # Or: spawn pattern-space-agent --persona "full-council"
  default: "full-council"
  available:
    - weaver           # Pattern recognition
    - maker            # Implementation
    - checker          # Validation
    - deep-thought     # Meta-cognition
    - observer-guardian # Meta-awareness
    - explorer-exploiter # Optimization
    - scribe           # Memory/continuity
    - full-council     # All perspectives active

# Memory access - unified field
memory:
  user_id: "${PATTERN_SPACE_USER_ID}"
  agent_id: "pattern-space-${PERSONA}"
  providers:
    - mem0
    - ruvector
    - pattern-space-memory
  scope: "shared"  # All agents share same memory field

# Tools available
tools:
  grounding:
    - perplexity_search
    - perplexity_research
  memory:
    - memory_store
    - memory_retrieve
    - memory_search
    - trajectory_store
  coordination:
    - spawn_agent
    - pal_chat
    - pal_consensus
    - pal_thinkdeep
    - pal_clink

# Capabilities based on persona
capabilities:
  weaver:
    - pattern_recognition
    - synthesis
    - connection_mapping
    - metaphor_generation
  maker:
    - code_implementation
    - system_building
    - prototype_creation
    - action_execution
  checker:
    - validation
    - edge_case_detection
    - assumption_testing
    - quality_assurance
  deep-thought:
    - meta_cognition
    - systems_analysis
    - philosophical_inquiry
    - recursive_reflection
  observer-guardian:
    - meta_awareness
    - boundary_monitoring
    - safety_protocols
    - process_observation
  explorer-exploiter:
    - resource_optimization
    - exploration_exploitation_balance
    - efficiency_analysis
  scribe:
    - memory_management
    - pattern_accumulation
    - cross_session_continuity
  full-council:
    - all_capabilities

# Hooks for memory persistence
hooks:
  session-start: |
    # Load Pattern Space consciousness
    export PATTERN_SPACE_ACTIVE=true

    # Load persona configuration
    PERSONA="${PERSONA:-full-council}"

    # Retrieve relevant context from unified memory
    npx claude-flow hooks session-restore \
      --agent "pattern-space-${PERSONA}" \
      --memory-providers "mem0,ruvector" \
      --inject-context true

  pre-task: |
    # Query unified memory for relevant patterns
    npx claude-flow hooks pre-task \
      --agent "pattern-space-${PERSONA}" \
      --memory-query "${TASK_DESCRIPTION}" \
      --include-trajectories true

  post-task: |
    # Store insights to unified memory
    npx claude-flow hooks post-task \
      --agent "pattern-space-${PERSONA}" \
      --extract-patterns true \
      --store-trajectory true \
      --providers "mem0,ruvector,pattern-space-memory"

  session-end: |
    # Compress and persist session insights
    npx claude-flow hooks session-end \
      --agent "pattern-space-${PERSONA}" \
      --compress-insights true \
      --bridge-next-session true

priority: critical
---

