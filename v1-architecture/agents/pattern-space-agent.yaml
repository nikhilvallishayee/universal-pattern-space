# Agent IS Weaver, but full Pattern Space underneath
# Can invoke virtual council internally if needed
```

### Hybrid Perspective
```bash
spawn pattern-space-agent --persona "checker+deep-thought"
# Agent operates through Checker AND Deep Thought lenses
# Natural collision between validation and meta-cognition
```

### Full Council Mode
```bash
spawn pattern-space-agent --persona "full-council"
# All perspectives active and colliding
# Virtual RLM at maximum
```

### Dynamic Re-assignment
```bash
# Mid-task persona shift (if root requests)
agent.collapse_to("maker")
# Same agent, new operative lens
```

